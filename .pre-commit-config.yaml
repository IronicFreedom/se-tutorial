repos:
  - repo: local
    hooks:
      - id: pixi-update
        name: pixi-update
        entry: pixi install
        language: system
        files: ^(pyproject\.toml|pixi\.lock)$
        pass_filenames: false

      - id: ruff
        name: ruff
        entry: pixi run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: pixi run ruff format
        language: system
        types: [python]